name: Docs

on:
  push:
    branches: [master, main]
    paths:
      - "doc/**"
      - "README.md"

jobs:
  panvimdoc:
    name: Regenerate vimdoc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Regenerate doc/winter.txt from README.md
        uses: kdheepak/panvimdoc@main
        with:
          vimdoc: winter
          version: "Neovim >= 0.10"
          demojify: true
          treesitter: true

      - name: Commit updated docs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs(winter): regenerate vimdoc"
          file_pattern: doc/
